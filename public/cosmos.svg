<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Sci-Fi Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Supernova Core Gradient -->
    <radialGradient id="coreGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="25%" stop-color="#c026d3" />
      <stop offset="100%" stop-color="#4c1d95" />
    </radialGradient>

    <!-- Neon Data Beam Gradient -->
    <linearGradient id="beamGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#e879f9" />
    </linearGradient>
  </defs>

  <!-- App Icon Base (Dark IDE theme) -->
  <rect width="512" height="512" rx="112" fill="#0b0e14" />

  <!-- Faint Node Grid Background -->
  <g stroke="#1a2235" stroke-width="3" opacity="0.6">
    <path d="M 0 128 L 512 128 M 0 256 L 512 256 M 0 384 L 512 384" />
    <path d="M 128 0 L 128 512 M 256 0 L 256 512 M 384 0 L 384 512" />
  </g>

  <!-- 3D Orbital Rings (Representing Trails and Math) -->
  <g fill="none" stroke-width="8" opacity="0.8">
    <ellipse cx="256" cy="256" rx="180" ry="70" stroke="#22d3ee" transform="rotate(30 256 256)" filter="url(#glow)"/>
    <ellipse cx="256" cy="256" rx="180" ry="70" stroke="#c026d3" transform="rotate(-45 256 256)" filter="url(#glow)"/>
  </g>

  <!-- Solid Data Beam -->
  <path d="M 130 190 L 400 340" stroke="url(#beamGrad)" stroke-width="12" stroke-linecap="round" filter="url(#glow)" />
  
  <!-- Dashed Data Beam (Representing floating point math) -->
  <path d="M 370 150 L 160 390" stroke="#22d3ee" stroke-width="6" stroke-dasharray="16, 12" stroke-linecap="round" opacity="0.9" />

  <!-- The Central Cosmos Core -->
  <circle cx="256" cy="256" r="76" fill="url(#coreGrad)" filter="url(#glow)" />

  <!-- === Interactive Node Points === -->
  
  <!-- Glowing Trail Endpoint -->
  <circle cx="130" cy="190" r="24" fill="#c026d3" filter="url(#glow)" />
  <circle cx="130" cy="190" r="10" fill="#ffffff" />
  
  <!-- Glowing Beam Endpoint -->
  <circle cx="400" cy="340" r="24" fill="#22d3ee" filter="url(#glow)" />
  <circle cx="400" cy="340" r="10" fill="#ffffff" />

  <!-- Unconnected Math Node (Top Right) -->
  <circle cx="370" cy="150" r="20" fill="#0b0e14" stroke="#e879f9" stroke-width="6" />
  <circle cx="370" cy="150" r="6" fill="#ffffff" />
  
  <!-- Unconnected Time Node (Bottom Left) -->
  <circle cx="160" cy="390" r="20" fill="#0b0e14" stroke="#22d3ee" stroke-width="6" />
</svg>
